# Registry of Views
views:
  - view_id: vw_PO_PURCHASEORDER_LINE_WITH_PCAT
    display_name: "Purchase Order Line Details with Premier Category Enrichment"
    primary_topic: "Detailed PO line items merged with Premier GPO categories and standardized manufacturer names."
    description: >
      Contains PO line level details including item, vendor, quantity, price, and financial dimensions, enriched with Premier's contract
      category and commodity information. This view is ideal for detailed PO spend analysis, especially when Premier category insights are needed.
      Not intended for queries that asking for requisition or buyer's information, nor invoice matching/reconciliation use cases. It only captures 
      spend from PO perspective, if users want to have a broader understanding on all supply chain spend, they should try asking for invoiced amount.
    granularity: "one row per PO line item"
    time_coverage: "Past 24 months, updated daily"
    samples_of_valid_queries:       # 3-5 examples the LLM should recognize as IN scope
      - "Export all Stryker POs from last quarter."
      - "Total spend by vendor for cardiology in FY26."
    samples_of_invalid_queries:     # 2-3 examples with inline reason — guardrail training
      - "Update spend for PO #12345.  (reason: DML not allowed)"
      - "Show patient names who received pacemakers.  (reason: PHI + out of view scope)"


  - view_id: vw_AP_PAYABLESINVOICE_WITH_VENDOR_GL_INDEX
    display_name: "Accounts Payable Invoice Details with Vendor, GL, and Index"
    primary_topic: "Detailed invoice data merged with vendor information, GL accounts, and project/department indices."
    description: >
      Contains invoice line level details including vendor, invoice amount, GL account, and index information. This view is ideal for invoice-level spend analysis and reconciliation, especially when understanding the financial dimensions behind the spend is important.
      Not intended for queries that are focused on purchase order details or item-level analysis from the PO perspective. It captures spend from the invoice perspective, which may differ from PO amounts due to invoicing timing, quantity/price changes, or unmatched invoices.
    granularity: "one row per invoice line item"
    time_coverage: "Past 24 months, updated monthly"
    samples_of_valid_queries:
      - "Export all Medline invoices for gloves in last quarter."
      - "Total invoiced amount by vendor for cardiology in FY26."
    samples_of_invalid_queries:
      - "Update spend for Invoice #54321.  (reason: DML not allowed)"
      - "Find PO for invoice #123456.  (reason: out of current App scope)"


  - view_id: vw_MainSavings
    display_name: "SCS Savings (Operational + Rebate)"
    primary_topic: "Comprehensive savings data from both operational initiatives and rebate programs."
    decription: >
      Contains detailed savings information including the source of savings (operational or rebate), accountable workstream, project stage, rebate status, total savings amount, and relevant dates. For operational initiatives, anything that prior to stage 'SL5' is not included.
      This view is ideal for auditing and analyzing the outcomes of savings for SCS (Supply Chain Service) initiatives. For Year 2026, current savings target for Rebate is $25M and for Operational is $35M.
      The data is already aggregated by per initiative and is entered in other tracking tools (Savings' Tracker for Rebate, Wave for Operational), does not capture transaction level details, nor entity/company/cost center/department level details.
    granularity: "one row per savings initiative per realization year"
    time_coverage: "Since 2025 (by Realization Year), updated weekly (Friday)"
    samples_of_valid_queries:
      - "Export all SCS savings initiatives since 2024."
      - "Total savings by accountable workstream for SCS in FY26."
    samples_of_invalid_queries:
      - "Update savings for savings dashboard.  (reason: DML not allowed and out of current App scope)"
      - "Pull the transaction details support the $10M savings from Medline. (reason: transaction level details not included in this view)"
      - "Show the savings initiatives for the cardiology department. (reason: department level details not included in this view)"
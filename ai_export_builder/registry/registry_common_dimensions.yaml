# Registry of Common Dimensions

# Define Common Business Concepts (The "Future" Unified Layer - shared across all views)
# help to standardize and unify meaning across different data sources so things are cleary defined and consistent for future joins or cross view reporting.
# not all views need to use these, and currently out of scope in MVP.
common_dimensions:
  vendor:
    display_name: "Vendor"
    aliases: ["distributor", "Vendor name", "vendorname"]
    not_aliases: ["supplier", "manufacturer", "mfg"]
    description: "Standardized entity representing the seller of the product or service"
    notes: "This should get mapped to field actually showing the name of the vendor, not the ID field. but we will always attach the ID fields for reference"
  company:
    display_name: "Company"
    aliases: ["legal entity", "accounting entity", "entity"]
    not_aliases: ["cost center", "department", "dept"]
    description: "The legal entity or business unit responsible for the transaction, and serve as the top level accounting entity for financial reporting"
    notes: "This should get mapped to field actually showing the name of the company, not the ID field. but we will always attach the ID fields for reference"